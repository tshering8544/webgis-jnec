<!doctype html>
<html>
  <head>
    <title>WEB Services</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-measure@3.3.0/dist/leaflet-measure.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  html, body {
    height: 100%;
    margin: 0;
  }

  /* Flexbox Layout for Sticky Footer */
  body {
    display: flex;
    flex-direction: column;
  }

  #map-container {
    flex: 1; /* Grows to fill space, pushing footer down */
    overflow: hidden; /* Prevents whole page from scrolling */
  }

  /* Fix the height of the row and map */
  .row {
    height: 100%;
  }

  #map {
    height: 100%;
    width: 100%;
  }

  /* Sidebar scrolling if content is long */
  .sidebar-scroll {
    overflow-y: auto;
    height: 100%;
  }

  .legend-color {
    width: 18px;
    height: 18px;
    display: inline-block;
    margin-right: 8px;
    border-radius: 3px;
  }

  footer {
    background-color: var(--bs-tertiary-bg);
  }
</style>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      #map {
        height: calc(100vh - 56px);
        width: 100%;
      }

      .legend-color {
        width: 18px;
        height: 18px;
        display: inline-block;
        margin-right: 8px;
        /* Add this to your existing <style> tag */
body {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

#map-container {
  flex: 1; /* This pushes the footer to the bottom */
}

footer {
  padding: 10px 0;
  background-color: var(--bs-body-bg);
  border-top: 1px solid #dee2e6;
}
      }
    </style>
  </head>

  <body>
   
  <div class="modal fade" id="signInModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="card">
          <div class="card-body p-5 text-center">
            <h3 class="mb-4">Welcome to Bhutan GIS</h3>
            <div class="form-outline mb-4 text-start">
              <label class="form-label">Email address</label>
              <input type="email" id="userEmail" class="form-control" placeholder="name@example.com" />
            </div>
            <div class="form-outline mb-4 text-start">
              <label class="form-label">Password</label>
              <input type="password" id="userPassword" class="form-control" />
            </div>
            <button class="btn btn-primary w-100" type="button" onclick="handleSignIn()">Sign In</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
      <div class="d-flex align-items-center">
        <img src="https://www.jnec.edu.bt/wp-content/uploads/2022/06/JNEC-Logo-100x100-1.png" alt="JNEC Logo" width="40" height="40" class="me-2">
        <span class="navbar-brand mb-0 h1">Bhutan Web GIS Application</span>
      </div>
    </div>
  </nav>

  <main id="map-container" class="container-fluid">
    <div class="row h-100">
      <div class="col-md-3 col-lg-2 bg-light border-end p-3 sidebar-scroll">
        <h5>Map Tools</h5>
        <button class="btn btn-primary w-100 mb-3" onclick="zoomToBhutan()">Zoom to Bhutan</button>
        
        <div class="card mb-3">
          <div class="card-header">Layers</div>
          <div class="card-body"><p class="small">Use the Leaflet layer control on the map.</p></div>
        </div>

        <div class="card">
          <div class="card-header">Legend</div>
          <div class="card-body">
            <p><span class="legend-color bg-warning"></span>Boundary</p>
            <p><span class="legend-color bg-primary"></span>Education</p>
            <p><span class="legend-color bg-danger"></span>Health</p>
          </div>
        </div>
      </div>

      <div class="col-md-9 col-lg-10 p-0">
        <div id="map"></div>
      </div>
    </div>
  </main>

  <footer class="footer py-3 border-top">
    <div class="container-fluid d-flex justify-content-between align-items-center">
      <span class="text-muted small">© 2026 Bhutan Web GIS Lab</span>
      <div class="dropdown">
        <button class="btn btn-outline-secondary dropdown-toggle btn-sm" type="button" data-bs-toggle="dropdown">
          Theme Mode
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
          <li><button class="dropdown-item" onclick="setTheme('light')">☀️ Light</button></li>
          <li><button class="dropdown-item" onclick="setTheme('dark')">🌙 Dark</button></li>
          <li><button class="dropdown-item" onclick="setTheme('auto')">🌓 Auto</button></li>
        </ul>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet-measure@3.3.0/dist/leaflet-measure.min.js"></script>
  <script src="script.js"></script>
  </body>
</html>
